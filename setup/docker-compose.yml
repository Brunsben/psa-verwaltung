services:
  nocodb:
    image: nocodb/nocodb:0.301.3
    container_name: nocodb
    ports:
      - "8181:8080"
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-nocodb}&p=${POSTGRES_PASSWORD}&d=${POSTGRES_DB:-nocodb}"
      NC_AUTH_JWT_SECRET: "${NC_AUTH_JWT_SECRET}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - nocodb_data:/usr/app/data
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: nocodb_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nocodb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nocodb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocodb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    container_name: psa_frontend
    ports:
      - "8182:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ../frontend/config.js:/usr/share/nginx/html/config.js:ro
    depends_on:
      - nocodb
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  nocodb_data:
  postgres_data:
