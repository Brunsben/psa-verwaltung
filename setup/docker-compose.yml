services:
  postgrest:
    image: postgrest/postgrest:v14.5
    container_name: psa_postgrest
    environment:
      PGRST_DB_URI: "postgresql://psa_auth:${POSTGREST_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-nocodb}"
      PGRST_DB_SCHEMAS: "pxicv3djlauluse"
      PGRST_DB_ANON_ROLE: "psa_anon"
      PGRST_SERVER_PORT: "3000"
      PGRST_DB_POOL: "5"
      PGRST_JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: nocodb_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nocodb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nocodb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocodb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    container_name: psa_frontend
    ports:
      - "8182:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ../frontend/config.js:/usr/share/nginx/html/config.js:ro
    depends_on:
      - postgrest
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
