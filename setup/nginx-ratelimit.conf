# Cloudflare Tunnel: echte Client-IP aus CF-Connecting-IP Header lesen
# (Tunnel verbindet sich von 127.0.0.1, daher $remote_addr sonst immer 127.0.0.1)
set_real_ip_from 127.0.0.1;
real_ip_header CF-Connecting-IP;

# Rate-Limiting für die NocoDB-API
# Diese Datei wird im http-Block eingebunden (via /etc/nginx/conf.d/).
# Zone "api": 10 MB Speicher, max. 30 Anfragen/Sekunde pro IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
